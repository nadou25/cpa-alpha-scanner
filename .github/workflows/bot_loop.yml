name: AlphaForge Bot — Boucle Continue

# Exécution périodique : toutes les 4h en semaine + manuel
on:
  schedule:
    # Toutes les 4 heures du lundi au vendredi (cron UTC)
    - cron: "0 6,10,14,18 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode d'exécution"
        required: true
        default: "once"
        type: choice
        options:
          - once
          - demo
          - full

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data dirs
        run: mkdir -p data/cache data/reports

      - name: Run AlphaForge Bot (one cycle)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RISK_FREE_RATE: "0.045"
        run: |
          MODE="${{ github.event.inputs.mode || 'once' }}"
          if [ "$MODE" = "demo" ]; then
            python bot_loop.py --once --demo
          else
            python bot_loop.py --once
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alphaforge-reports-${{ github.run_number }}
          path: data/reports/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          t = os.getenv('TELEGRAM_BOT_TOKEN'); c = os.getenv('TELEGRAM_CHAT_ID')
          if t and c:
              requests.post(f'https://api.telegram.org/bot{t}/sendMessage', json={
                  'chat_id': c,
                  'text': '⛔ <b>AlphaForge Bot — Run #${{ github.run_number }} FAILED</b>\nCheck GitHub Actions logs.',
                  'parse_mode': 'HTML'
              })
          "
